<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChampMart System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        /* --- THE DESIGN SYSTEM (Source of Truth) --- */
        :root {
            --bg-obsidian: #0a0a0c;
            --bg-card: rgba(23, 23, 26, 0.7);
            --bg-input: rgba(0, 0, 0, 0.3);
            --neon-purple: #a855f7;
            --neon-pink: #ec4899;
            --accent-gradient: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-obsidian);
            color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NAVIGATION TERMINAL --- */
        .system-nav {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-link-custom {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            padding: 0.5rem 1rem;
        }

        .nav-link-custom:hover {
            color: white;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        /* --- BROWSER HISTORY CONTROLS --- */
        .history-controls {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            display: flex;
            gap: 0.5rem;
            z-index: 9999;
        }

        .control-btn {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .control-btn:hover {
            border-color: var(--neon-purple);
            background: var(--accent-gradient);
            transform: translateY(-3px);
        }

        /* --- GLOBAL UTILITIES --- */
        .fw-900 {
            font-weight: 900;
        }

        .letter-spacing-2 {
            letter-spacing: 2px;
        }

        .x-small {
            font-size: 0.7rem;
        }

            {
            % block styles %
        }

            {
            % endblock %
        }
    </style>
</head>

<body>

    <nav class="system-nav">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="{{ url_for('main.home_page') }}" class="text-decoration-none">
                <span class="fw-900 text-white h4 mb-0">CHAMP<span class="text-primary">MART</span></span>
            </a>

            <div class="d-none d-md-flex gap-3">
                <a href="{{ url_for('main.get_all_items') }}" class="nav-link-custom">Inventory</a>
                <a href="{{ url_for('main.contact') }}" class="nav-link-custom">Support</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('auth.dashboard') }}" class="nav-link-custom">Dashboard</a>
                {% else %}
                <a href="{{ url_for('auth.login') }}" class="nav-link-custom">Login</a>
                {% endif %}
            </div>

            <div class="d-flex align-items-center gap-3">
                <a href="{{ url_for('main.redirect_to_cart') }}" class="position-relative text-white">
                    <i class="fas fa-shopping-cart"></i>
                    {% if cart_items %}
                    <span
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger x-small">
                        {{ cart_items|length }}
                    </span>
                    {% endif %}
                </a>
            </div>
        </div>
    </nav>

    <main class="animate__animated animate__fadeIn">
        {% block content %}{% endblock %}
    </main>

    <div class="history-controls d-none d-lg-flex">
        <button onclick="window.history.back()" class="control-btn" title="Rollback State">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button onclick="window.history.forward()" class="control-btn" title="Forward State">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
